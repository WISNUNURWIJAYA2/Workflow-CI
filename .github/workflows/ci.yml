name: CI - Titanic MLflow Training

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  train:
    name: Train Titanic Survival Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install MLflow and dependencies
        run: |
          pip install setuptools mlflow==2.13.0 scikit-learn==1.4.2 pandas==2.2.2 numpy==1.26.4 joblib==1.4.2

      - name: Run MLflow project
        working-directory: MLProject
        run: mlflow run . --env-manager=local -P test_size=0.2 -P random_state=42 

      - name: Upload MLflow results
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-results
          path: |
            MLProject/mlflow.db
            MLProject/mlruns/
            MLProject/model.pkl
          retention-days: 7
